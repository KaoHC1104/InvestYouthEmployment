<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資青年就業方案第二期</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f7f4ef;
    --accent: #c8502a;
    --accent2: #2a6496;
    --muted: #7a7a8a;
    --rule: #d4cfc8;
    --tag-定方向: #e8f4e8;
    --tag-定方向-text: #2d6a2d;
    --tag-增人才: #e8eef8;
    --tag-增人才-text: #1a4a8a;
    --tag-促就業: #fef3e8;
    --tag-促就業-text: #8a4a1a;
    --tag-爭好薪: #f8e8f0;
    --tag-爭好薪-text: #6a1a4a;
    --tag-轉正職: #e8f8f4;
    --tag-轉正職-text: #1a5a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 3rem 4rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 60px,
      rgba(255,255,255,0.03) 60px,
      rgba(255,255,255,0.03) 61px
    );
  }
  .header-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  header p {
    color: rgba(247,244,239,0.6);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
  }

  /* FILTER BAR */
  .filter-bar {
    background: white;
    border-bottom: 1px solid var(--rule);
    padding: 1rem 4rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .filter-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .filter-pills {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .pill {
    padding: 0.3rem 0.9rem;
    border-radius: 999px;
    font-size: 0.78rem;
    cursor: pointer;
    border: 1.5px solid var(--rule);
    background: transparent;
    color: var(--ink);
    transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 400;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .pill[data-filter="定方向"].active { background: var(--tag-定方向-text); border-color: var(--tag-定方向-text); }
  .pill[data-filter="增人才"].active { background: var(--tag-增人才-text); border-color: var(--tag-增人才-text); }
  .pill[data-filter="促就業"].active { background: var(--tag-促就業-text); border-color: var(--tag-促就業-text); }
  .pill[data-filter="爭好薪"].active { background: var(--tag-爭好薪-text); border-color: var(--tag-爭好薪-text); }
  .pill[data-filter="轉正職"].active { background: var(--tag-轉正職-text); border-color: var(--tag-轉正職-text); }

  .search-box {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: 6px;
    padding: 0.3rem 0.75rem;
  }
  .search-box input {
    border: none;
    background: transparent;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.82rem;
    color: var(--ink);
    outline: none;
    width: 180px;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 0.9rem; }

  /* MAIN CONTENT */
  main {
    padding: 2.5rem 4rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* STRATEGY SECTIONS */
  .strategy-section {
    margin-bottom: 2.5rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }
  .strategy-section:hover {
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .strategy-header {
    display: flex;
    align-items: stretch;
    cursor: pointer;
    user-select: none;
  }
  .strategy-color-bar {
    width: 5px;
    flex-shrink: 0;
  }
  .strategy-title-area {
    flex: 1;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    background: white;
  }
  .strategy-badge {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .strategy-issue {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .strategy-count {
    margin-left: auto;
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--paper);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    white-space: nowrap;
  }
  .strategy-toggle {
    padding: 0 1.25rem;
    background: white;
    display: flex;
    align-items: center;
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.3s;
  }
  .strategy-section.collapsed .strategy-toggle { transform: rotate(-90deg); }

  /* CARDS GRID */
  .cards-container {
    padding: 1rem 1.25rem 1.25rem;
    background: var(--paper);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 0.85rem;
  }
  .strategy-section.collapsed .cards-container { display: none; }

  /* CARD */
  .card {
    background: white;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 1.1rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease both;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-1px); }
  .card:hover::before { opacity: 1; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.4;
  }
  .card-measure {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    border-left: 2px solid var(--rule);
    padding-left: 0.6rem;
  }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.2rem;
  }
  .meta-chip {
    font-size: 0.68rem;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    background: var(--paper);
    color: var(--muted);
    border: 1px solid var(--rule);
    white-space: nowrap;
  }
  .meta-chip.agency { color: var(--accent2); border-color: #b8d0e8; background: #f0f5fb; }
  .meta-chip.target { color: #666; }
  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.72rem;
    color: var(--accent2);
    text-decoration: none;
    margin-top: 0.2rem;
    transition: color 0.15s;
  }
  .card-link:hover { color: var(--accent); text-decoration: underline; }
  .card-link::before { content: '↗'; font-size: 0.8em; }

  /* HIDDEN STATE */
  .card.hidden { display: none; }
  .strategy-section.hidden { display: none; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 2rem;
    padding: 1.5rem 4rem;
    background: white;
    border-bottom: 1px solid var(--rule);
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }
  .stat-num {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .stat-divider {
    width: 1px;
    background: var(--rule);
    align-self: stretch;
  }

  /* STRATEGY COLORS */
  .s-定方向 .strategy-color-bar { background: var(--tag-定方向-text); }
  .s-定方向 .strategy-badge { color: var(--tag-定方向-text); }
  .s-定方向 .card::before { background: var(--tag-定方向-text); }
  .s-增人才 .strategy-color-bar { background: var(--tag-增人才-text); }
  .s-增人才 .strategy-badge { color: var(--tag-增人才-text); }
  .s-增人才 .card::before { background: var(--tag-增人才-text); }
  .s-促就業 .strategy-color-bar { background: var(--tag-促就業-text); }
  .s-促就業 .strategy-badge { color: var(--tag-促就業-text); }
  .s-促就業 .card::before { background: var(--tag-促就業-text); }
  .s-爭好薪 .strategy-color-bar { background: var(--tag-爭好薪-text); }
  .s-爭好薪 .strategy-badge { color: var(--tag-爭好薪-text); }
  .s-爭好薪 .card::before { background: var(--tag-爭好薪-text); }
  .s-轉正職 .strategy-color-bar { background: var(--tag-轉正職-text); }
  .s-轉正職 .strategy-badge { color: var(--tag-轉正職-text); }
  .s-轉正職 .card::before { background: var(--tag-轉正職-text); }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    display: none;
  }
  .no-results.visible { display: block; }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    border-top: 1px solid var(--rule);
  }

  @media (max-width: 768px) {
    header, .filter-bar, main, .stats-bar { padding-left: 1.25rem; padding-right: 1.25rem; }
    .cards-container { grid-template-columns: 1fr; }
    .search-box input { width: 120px; }
    .strategy-badge { font-size: 1.1rem; }
  }
</style>
</head>

// Build DOM
const main = document.getElementById('main-content');
let totalCards = 0;
let totalLinks = 0;

data.forEach(section => {
  const count = section.items.length;
  totalCards += count;
  totalLinks += section.items.filter(i => i.link).length;

  const sec = document.createElement('div');
  sec.className = `strategy-section s-${section.strategy}`;
  sec.dataset.strategy = section.strategy;

  sec.innerHTML = `
    <div class="strategy-header" onclick="toggleSection(this)">
      <div class="strategy-color-bar"></div>
      <div class="strategy-title-area">
        <span class="strategy-badge">${section.strategy}</span>
        <span class="strategy-issue">${section.issue}</span>
        <span class="strategy-count">${count} 項措施</span>
      </div>
      <div class="strategy-toggle">▼</div>
    </div>
    <div class="cards-container" id="cards-${section.strategy}">
      ${section.items.map((item, i) => `
        <div class="card" style="animation-delay:${i*0.04}s" 
             data-text="${[item.name, item.measure, item.agency, item.target, item.plan].join(' ').toLowerCase()}">
          <div class="card-name">${item.plan && item.plan !== '—' ? item.plan : item.name}</div>
          ${item.measure ? `<div class="card-measure">${item.measure}</div>` : ''}
          <div class="card-meta">
            <span class="meta-chip agency">🏛 ${item.agency}</span>
            <span class="meta-chip target">👥 ${item.target}</span>
          </div>
          ${item.link ? `<a class="card-link" href="${item.link}" target="_blank" rel="noopener">${item.name}</a>` : ''}
        </div>
      `).join('')}
    </div>
  `;
  main.insertBefore(sec, document.getElementById('no-results'));
});



// Filter
let activeFilter = 'all';
let searchQuery = '';

function applyFilters() {
  const sections = document.querySelectorAll('.strategy-section');
  let anyVisible = false;

  sections.forEach(sec => {
    const strategy = sec.dataset.strategy;
    const stratMatch = activeFilter === 'all' || activeFilter === strategy;
    if (!stratMatch) { sec.classList.add('hidden'); return; }

    const cards = sec.querySelectorAll('.card');
    let visibleCards = 0;
    cards.forEach(card => {
      const text = card.dataset.text || '';
      const match = !searchQuery || text.includes(searchQuery);
      card.classList.toggle('hidden', !match);
      if (match) visibleCards++;
    });

    if (visibleCards === 0 && searchQuery) {
      sec.classList.add('hidden');
    } else {
      sec.classList.remove('hidden');
      anyVisible = true;
    }
  });

  document.getElementById('no-results').classList.toggle('visible', !anyVisible);
}

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeFilter = pill.dataset.filter;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  applyFilters();
});

function toggleSection(header) {
  const sec = header.closest('.strategy-section');
  sec.classList.toggle('collapsed');
}
</script>
